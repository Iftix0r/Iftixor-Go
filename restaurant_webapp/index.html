<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Restoran Paneli</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Sarlavha -->
  <header class="header">
    <div class="header-info">
      <div class="rest-name" id="restName">Sotuvchi yuklanmoqda...</div>
      <div class="rest-sub" id="restSub">Sotuvchi paneli</div>
    </div>
  </header>

  <!-- Sahifalar -->
  <div id="page-create" class="page">
    <div class="page-title">Sotuvchini ro'yxatdan o'tkazish</div>
    <div class="card">
      <input type="text" id="createName" placeholder="Do'kon nomi (Masalan: Lavash Center)" class="input">
      <input type="text" id="createPhone" placeholder="Telefon raqam" class="input">
      <input type="text" id="createAddress" placeholder="Manzil" class="input">
      <button class="btn btn-primary" onclick="createRestaurant()" style="width:100%; margin-top: 10px;">Yaratish</button>
    </div>
  </div>

  <div id="page-orders" class="page">
    <div class="page-title">Buyurtmalar</div>
    <div id="ordersList"></div>
  </div>

  <div id="page-products" class="page">
    <div class="page-title-row">
      <div class="page-title">Mahsulotlar</div>
      <button class="btn-sm" onclick="showAddProductModal()">+ Qo'shish</button>
    </div>
    <div id="productsList"></div>
  </div>

  <div id="page-settings" class="page">
    <div class="page-title">Hisob-kitob va Sozlamalar</div>
    <div class="settings-card">
      <div class="stat-row">
        <span>👁️ Sahifa ko'rishlar:</span>
        <strong id="statViews">0</strong>
      </div>
      <div class="stat-row">
        <span>🛒 Sotilgan mahsulotlar:</span>
        <strong id="statSold">0</strong>
      </div>
      <div class="stat-row">
        <span>📦 Jami buyurtmalar:</span>
        <strong id="statOrders">0</strong>
      </div>
      <div class="stat-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);">
        <span>💰 Umumiy daromad:</span>
        <strong id="statRevenue" style="color: var(--primary);">0 so'm</strong>
      </div>
    </div>
    <button class="btn btn-danger" onclick="closeApp()">Chiqish</button>
  </div>

  <!-- Modal: Maxsulot qo'shish/tahrirlash -->
  <div id="productModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Yangi mahsulot</h3>
      <input type="hidden" id="prodId">
      <input type="text" id="prodName" placeholder="Nomi" class="input">
      <textarea id="prodDesc" placeholder="Tavsifi" class="input"></textarea>
      <input type="number" id="prodPrice" placeholder="Narxi (so'm)" class="input">
      <input type="text" id="prodImage" placeholder="Rasm URL" class="input">
      
      <!-- Kategoriyani tanlash uchun -->
      <select id="prodCategory" class="input">
        <option value="">Kategoriya yuklanmoqda...</option>
      </select>
      
      <label class="checkbox-row">
        <input type="checkbox" id="prodAvailable" checked> Sotuvda mavjud
      </label>
      
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeProductModal()">Bekor qilish</button>
        <button class="btn btn-primary" onclick="saveProduct()">Saqlash</button>
      </div>
    </div>
  </div>

  <!-- Pastki menyu -->
  <nav class="bottom-nav">
    <div class="nav-item active" id="navOrders" onclick="switchPage('orders')">
      <span>📦</span> Buyurtmalar
    </div>
    <div class="nav-item" id="navProducts" onclick="switchPage('products')">
      <span>🍔</span> Mahsulotlar
    </div>
    <div class="nav-item" id="navSettings" onclick="switchPage('settings')">
      <span>⚙️</span> Sozlamalar
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
